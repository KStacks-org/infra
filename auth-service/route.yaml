apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: default
spec:
  parentRefs:
    - name: kstacks-gateway
  hostnames:
    - "api.kstacks.org"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: api-cors 
      backendRefs:
        - name: auth-service
          port: 80
          
