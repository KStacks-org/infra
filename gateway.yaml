apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kstacks-gateway
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  gatewayClassName: traefik
  listeners:
    - name: https
      protocol: HTTPS
      port: 8443
      hostname: "*.kstacks.org"
      tls:
        mode: Terminate
        certificateRefs:
          - name: kstacks-api-tls
    - name: http
      protocol: HTTP
      port: 8000
      hostname: "*.kstacks.org"
      allowedRoutes:
        namespaces:
          from: Same
