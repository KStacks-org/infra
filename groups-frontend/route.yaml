apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: groups-frontend-route
  namespace: default
spec:
  parentRefs:
    - name: kstacks-gateway
  hostnames:
    - "groups.kstacks.org"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: groups-frontend-service
          port: 80
          
